name: Literature Review
description: Como conduzir uma revisao de literatura estruturada e rastreavel.
content: '# Revisao de literatura


  ## Processo

  1. Pergunta + criterios de inclusao/exclusao.

  2. Buscar em fontes multiplas.

  3. Triagem: titulo -> resumo -> texto completo.

  4. Matriz: fonte, metodo, achado, limitacao.


  ## Sintese

  - Agrupe por tema; consensos, divergencias, lacunas.


  ## Rastreabilidade

  - Cite cada afirmacao; registre data de acesso.'
