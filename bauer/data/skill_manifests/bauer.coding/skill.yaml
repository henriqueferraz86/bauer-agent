id: bauer.coding
name: Bauer Coding
version: 1.0.0
description: Code reading, editing, review and test-generation capability.
capabilities:
  - code.read
  - code.write
  - code.review
permissions:
  - filesystem.read
  - filesystem.write
  - shell.execute
risk: high
platforms:
  - windows
  - linux
  - darwin
inputs:
  task:
    type: string
outputs:
  result:
    type: text
