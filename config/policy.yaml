rules:
  - id: os.open_app.allow
    operation: os.open_app
    action: allow
  - id: network.http.secret_exfiltration.deny
    operation: network.http
    action: deny
    reason: network request contains secret material
    when:
      contains_secret: true
  - id: network.http.allow
    operation: network.http
    action: allow
  - id: agent.delegate.allow
    operation: agent.delegate
    action: allow
  - id: shell.execute.ask
    operation: shell.execute
    action: ask
  - id: filesystem.delete.ask
    operation: filesystem.delete
    action: ask
  - id: social.publish.ask
    operation: social.publish
    action: ask
  - id: production.deploy.ask
    operation: production.deploy
    action: ask
  - id: os.ui_control.ask
    operation: os.ui_control
    action: ask
  - id: filesystem.read.allow
    operation: filesystem.read
    action: allow
  - id: filesystem.write.outside_workspace.ask
    operation: filesystem.write
    action: ask
    when:
      outside_workspace: true
