# Registry de modelos conhecidos.
# Campos ram_base_mb e ram_per_1k_ctx_mb conforme Decisão 3 (fórmula de RAM segura).
# Valores iniciais são estimativas; o learning_engine (Fase 7) refina por máquina.
#
# supports_tools: true habilita FUNCTION CALLING NATIVO (estruturado, confiável);
# false/partial cai no tool bridge (por prompt), que modelos menores seguem mal
# em tarefas multi-passo. Os modelos qwen2.5/qwen3 suportam tools nativas no
# Ollama — marcá-los false forçava o bridge e eles "descreviam" comandos em vez
# de executá-los.

models:
  "qwen2.5-coder:3b":
    provider: ollama
    ram_base_mb: 2400
    ram_per_1k_ctx_mb: 35
    max_context_safe: 32768
    supports_tools: true
    ram_profile: low
    recommended_for:
      - code_simple
      - shell
      - automation

  "qwen2.5-coder:7b":
    provider: ollama
    ram_base_mb: 5200
    ram_per_1k_ctx_mb: 70
    max_context_safe: 32768
    supports_tools: true
    ram_profile: medium
    recommended_for:
      - coding
      - refactor

  "llama3.1:8b":
