id: worker-protocol-v1
title: Bauer Kanban worker protocol
status: accepted
created_at: 2026-06-01

problem:
  summary: >
    A worker must know which task it owns, must not mutate another claimed
    task, and must leave an auditable trail of heartbeats, completion, block,
    or failure.

goals:
  - Pin each worker to one task through environment context.
  - Give tools a way to detect worker context and reject foreign task mutation.
  - Record completion, block, heartbeat, and protocol violation events.
  - Stay compatible with the existing subprocess orchestrator while stricter
    tool-finalization is rolled out.

worker_environment:
  BAUER_KANBAN_TASK: normalized TASKS.md id
  BAUER_KANBAN_PUBLIC_TASK: public id such as T0001
  BAUER_KANBAN_CLAIM_ID: dispatcher claim token
  BAUER_KANBAN_RUN_ID: durable run id
  BAUER_KANBAN_WORKSPACE: absolute workspace path

allowed_worker_tools:
  - kanban_heartbeat
  - kanban_comment
  - kanban_complete
  - kanban_block

rules:
  - If BAUER_KANBAN_TASK is set, kanban_* mutation tools may only mutate that task.
  - kanban_heartbeat updates task metadata and the active run heartbeat.
  - kanban_complete marks the task DONE and the run succeeded.
  - kanban_block marks the task BLOCKED and the run blocked.
  - A claim_id mismatch is a protocol violation.

compatibility:
  mode: hybrid
  detail: >
    For now, subprocess exit status can still finalize a task when the worker
    did not call kanban_complete or kanban_block. The stricter mode can later
    require tool-based finalization per task or per agent.

acceptance:
  - A worker receives all BAUER_KANBAN_* environment variables.
  - kanban_complete for the pinned task records a worker.completed_by_tool event.
  - kanban_block for the pinned task records a worker.blocked_by_tool event.
  - kanban_* mutation for a different task fails when BAUER_KANBAN_TASK is set.
  - Dispatcher still completes legacy workers based on subprocess result.
