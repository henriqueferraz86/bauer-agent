agent:
  name: Bauer Agent
  workspace: ./workspace
logging:
  file: ./logs/bauer.log
  level: info
model:
  auto_downgrade_context: true
  minimum_context: 4096
  name: qwen2.5-coder:3b
  provider: ollama
  requested_context: 4096
  think: false
ollama:
  api_key: ''
  host: http://localhost:11434
  timeout_seconds: 120
openai:
  api_key: ''
  host: https://api.openai.com
  timeout_seconds: 60
openrouter:
  api_key: ''
  timeout_seconds: 60
router:
  enabled: true
  router_model: llama3.2:3b
  direct_model: qwen2.5-coder:3b
  code_model: qwen2.5-coder:3b
  reasoning_model: qwen2.5-coder:3b
runtime:
  profile: low
  ram_limit_mb: 8192
  safety_margin_mb: 2048
serve:
  api_key: ''
  host: 0.0.0.0
  port: 8000
  workers: 1
tools:
  max_output_kb: 50
  safe_mode: true
  shell_enabled: true
  timeout_seconds: 300
  web_enabled: true
