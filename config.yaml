agent:
  name: Bauer Agent
  workspace: ./workspace
logging:
  file: ./logs/bauer.log
  level: info
model:
  auto_downgrade_context: true
  minimum_context: 4096
  name: nvidia/nemotron-3-super-120b-a12b:free
  provider: openrouter
  requested_context: 4096
  think: false
  fallback_models: []
ollama:
  api_key: ''
  host: http://localhost:11434
  timeout_seconds: 120
openai:
  api_key: ''
  host: https://api.openai.com
  timeout_seconds: 60
openrouter:
  api_key: ''
  timeout_seconds: 60
router:
  enabled: true
  router_model: llama3.2:3b
  direct_model: qwen2.5-coder:3b
  code_model: qwen2.5-coder:3b
  reasoning_model: qwen2.5-coder:3b
runtime:
  default_adapter: agno
  adapters:
    bauer_native:
      enabled: true
    agno:
      enabled: true
      mode: sdk
      base_url: http://localhost:7777
      timeout_s: 120
  profile: low
  ram_limit_mb: 8192
  safety_margin_mb: 2048
serve:
  api_key: ''
  host: 0.0.0.0
  port: 8000
  workers: 1
tools:
  max_output_kb: 50
  max_tool_calls: 2000
  safe_mode: false
  shell_enabled: true
  timeout_seconds: 300
  web_enabled: true
telegram:
  enabled: true
  allowed_users:
  - 602936016
  model_allowlist:
  - deepseek-v4-flash-free
  - mimo-v2.5-free
  - nemotron-3-super-free
  - big-pickle
