name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Check imports (smoke test)
        run: |
          python -c "from bauer.cli import app"
          python -c "from bauer.orchestrator import AgentOrchestrator"
          python -c "from bauer.spec_manager import SpecManager"
          python -c "from bauer.agent_registry import AgentRegistry"
          python -c "from bauer.workspace_manager import WorkspaceManager"
          python -c "from bauer.server import _RateLimiter"

      - name: Run tests
        run: pytest tests/ -q --tb=short

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff (check only — não falha em warnings de estilo)
        run: ruff check bauer/ --select E,F,W --ignore E501,W291,W293,E302,E303 || true
        # E501 = line too long (intencionalmente ignorado — código tem linhas longas)
        # || true = lint não bloqueia merge, apenas reporta

  coverage:
    name: Coverage report
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run tests with coverage
        run: |
          pytest tests/ --cov=bauer --cov-report=term-missing --cov-report=xml -q

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7
