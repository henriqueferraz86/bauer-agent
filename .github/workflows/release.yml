name: Release

# Corta uma release do Bauer Desktop (app nativo Tauri) nos 3 SOs.
#   - push de tag v*  → cria uma GitHub Release DRAFT + latest.json (auto-update).
#   - workflow_dispatch → só builda (sem release), para validar o pipeline.
#
# Requer os secrets do updater (gerados via `tauri signer generate`):
#   TAURI_SIGNING_PRIVATE_KEY, TAURI_SIGNING_PRIVATE_KEY_PASSWORD
# Sem eles, a assinatura dos artefatos de update falha.
# (Code-signing OS — Authenticode/Apple — fica para fase futura: instaladores unsigned.)

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  release:
    name: Release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Linux — deps do WebKit/Tauri
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev patchelf \
            libayatana-appindicator3-dev build-essential curl wget file libssl-dev

      - name: Install deps (desktop)
        working-directory: desktop
        run: npm ci

      - name: Build + release (tauri-action)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: desktop
          # Habilita os artefatos de update (gera os .sig + entra no latest.json).
          args: --config src-tauri/tauri.release.conf.json
          # Em push de tag: cria release DRAFT. Em dispatch (sem tag): só builda.
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: ${{ github.ref_type == 'tag' && format('Bauer Agent {0}', github.ref_name) || '' }}
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
